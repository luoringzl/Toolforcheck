name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and test installer
        shell: powershell
        run: .\build\windows\build.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: offline-personnel-verifier-windows-installer
          path: dist-installer/*.exe
          if-no-files-found: error
          retention-days: 14
